name: Deploy Apps Script backend

# Publica apps_script.gs en Google Apps Script en cada push a main.
# El frontend (index.html) se publica por separado vía GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - 'apps_script.gs'
      - 'appsscript.json'
      - '.github/workflows/deploy-appsscript.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp@2.4.2

      - name: Write clasp credentials
        run: echo "$CLASPRC_JSON" > ~/.clasprc.json
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}

      - name: Push to Apps Script
        run: clasp push -f

      - name: Deploy (misma URL /exec)
        run: clasp deploy -i AKfycbwYgsRz2nZajq1wrCzjcgUMa4gSlKGZvZeaj2G8jiOuSOiJx-0PZJmEBuP4X8TePoH6Ng -d "Auto-deploy ${{ github.sha }}"
